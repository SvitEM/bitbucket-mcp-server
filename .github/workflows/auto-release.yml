name: Auto Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
      
      - name: Calculate new version
        id: new_version
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.last_tag }}"
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Create tag
        id: create_tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag "${{ steps.new_version.outputs.new_tag }}"
          git push origin "${{ steps.new_version.outputs.new_tag }}"
          echo "tag=${{ steps.new_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          fromTag: "${{ steps.last_tag.outputs.last_tag }}"
          toTag: "${{ steps.new_version.outputs.new_tag }}"
          configurationJson: |
            {
              "categories": [
                { "title": "### Features", "labels": ["feat", "feature"] },
                { "title": "### Bug Fixes", "labels": ["fix", "bug"] },
                { "title": "### Dependencies", "labels": ["deps", "dependencies"] },
                { "title": "### Other", "labels": [] }
              ],
              "ignore_labels": ["chore", "ci", "test"],
              "template": "${{env.CHANGELOG}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          name: Release ${{ needs.create-release.outputs.tag_name }}
          body: ${{ needs.create-release.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
